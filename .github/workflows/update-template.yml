name: Update Template CI
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
permissions:
  contents: write
  issues: write
  actions: write
  pages: write
jobs:
  update-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@v1.37.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          command: update-template
