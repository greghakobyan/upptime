name: Enforce Pages HTTPS

on:
  workflow_dispatch:
  schedule:
    - cron: "23 * * * *"

permissions:
  contents: read
  pages: write

jobs:
  enforce-https:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enable HTTPS when the certificate is ready
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          enforced=$(gh api "repos/${GITHUB_REPOSITORY}/pages" --jq '.https_enforced')
          if [[ "$enforced" == "true" ]]; then
            echo "GitHub Pages HTTPS enforcement is already enabled."
            exit 0
          fi

          set +e
          response=$(gh api --method PUT "repos/${GITHUB_REPOSITORY}/pages" \
            -F https_enforced=true 2>&1)
          exit_code=$?
          set -e

          if [[ $exit_code -eq 0 ]]; then
            echo "GitHub Pages HTTPS enforcement is now enabled."
            exit 0
          fi

          if [[ "$response" == *"The certificate does not exist yet"* \
            && "$response" == *"HTTP 404"* ]]; then
            echo "GitHub Pages certificate is not ready yet; the next hourly run will retry."
            exit 0
          fi

          printf '%s\n' "$response" >&2
          exit "$exit_code"
